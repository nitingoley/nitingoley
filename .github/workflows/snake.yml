name: GitHub Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"  # Runs daily at midnight UTC
  workflow_dispatch:  # Allows manual trigger
  push:
    branches:
      - main  # Runs when pushing to main branch

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Create Animated Snake GIF
        run: |
          # Install necessary tools
          sudo apt-get update
          sudo apt-get install -y imagemagick gifsicle

          # Generate a random snake animation (just a placeholder here)
          convert -size 200x200 xc:black -gravity center -pointsize 20 -fill white -annotate 0 '🐍 Snake' /tmp/snake.gif

          # Optionally, optimize the GIF using gifsicle
          gifsicle -O3 /tmp/snake.gif -o /tmp/snake-optimized.gif

          # Move it to the dist folder
          mv /tmp/snake-optimized.gif dist/github-snake.gif

      - name: Deploy Snake GIF to Output Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          commit_message: "Update snake animation [skip ci]"

